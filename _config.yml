# GitHub Pages config for gettilth.com
#
# `index.html` at the repo root is served as the landing page verbatim
# (no Jekyll theme applied — the file is self-contained with its own
# CSS). `privacy.md` and `terms.md` continue to render via Jekyll's
# default markdown processor so the legal pages stay plain and
# readable.

title: Tilth
description: A garden tracking app for iPhone. Track your beds, plants, soil, and weather. Get personalized AI diagnoses grounded in your garden's history.
url: https://gettilth.com

# Keep the default theme for markdown pages only. Jekyll won't touch
# files that already contain full HTML doctype.
theme: minima

# Restrict the minima header nav to legal pages only. Without this,
# minima auto-includes every page on the site (including all 26
# article pages), which pollutes the privacy/terms page navigation.
# The article pages use the custom `guide.html` layout and aren't
# affected by minima's nav.
header_pages:
  - privacy.md
  - terms.md

# Exclude dev / editor noise from the published site.
exclude:
  - README.md
  - .gitignore
  - .DS_Store
  - Gemfile
  - Gemfile.lock
  - pin-briefs
  - pin-prompts
  - node_modules
  - scripts
  - package.json
  - package-lock.json
